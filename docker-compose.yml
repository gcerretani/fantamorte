services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: fantamorte
      MARIADB_USER: fantamorte
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Cache condivisa (classifiche, ricerca Wikidata, check bonus): pura
  # cache, nessuna persistenza — l'invalidazione a chiave versionata in
  # scoring.py tollera i flush.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    image: ghcr.io/gcerretani/fantamorte:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://fantamorte:${DB_PASSWORD}@db:3306/fantamorte
      REDIS_URL: redis://redis:6379/1
    # Gunicorn resta raggiungibile solo da localhost per debug: il traffico
    # pubblico passa da nginx.
    ports:
      - "127.0.0.1:${PORT:-8000}:8000"
    volumes:
      - static_files:/app/staticfiles
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Job periodici: check_deaths + reminder sostituzioni + bonus primo/ultimo.
  scheduler:
    image: ghcr.io/gcerretani/fantamorte:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://fantamorte:${DB_PASSWORD}@db:3306/fantamorte
      # Stessa cache dei worker web: check_deaths deve invalidare le
      # stesse chiavi di classifica che le pagine leggono.
      REDIS_URL: redis://redis:6379/1
      SCHEDULER_DAILY_HOUR: ${SCHEDULER_DAILY_HOUR:-6}
      SCHEDULER_INTERVAL_SECONDS: ${SCHEDULER_INTERVAL_SECONDS:-3600}
    volumes:
      - ./deploy/scheduler.sh:/scheduler.sh:ro
    # Salta l'entrypoint (migrate): le migrazioni le applica il servizio web.
    entrypoint: ["sh", "/scheduler.sh"]

  nginx:
    image: nginx:1.27
    restart: unless-stopped
    depends_on:
      - web
    environment:
      SERVER_NAME: ${SERVER_NAME:?Impostare SERVER_NAME nel file .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./deploy/nginx/start.sh:/start.sh:ro
      - static_files:/app/staticfiles:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - nginx_certs:/etc/nginx/certs
    command: ["sh", "/start.sh"]

  # Emissione iniziale (una tantum):
  #   docker compose run --rm certbot certonly --webroot -w /var/www/certbot \
  #     -d $SERVER_NAME --email <email> --agree-tos --no-eff-email
  #   docker compose restart nginx
  # Poi questo servizio rinnova automaticamente ogni 12 ore.
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: ["/bin/sh", "-c", "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"]

  # Backup giornaliero del DB con rotazione (default 14 giorni).
  db_backup:
    image: mariadb:11
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
    volumes:
      - ./deploy/backup.sh:/backup.sh:ro
      - db_backups:/backups
    entrypoint: ["sh", "/backup.sh"]

volumes:
  db_data:
  db_backups:
  static_files:
  letsencrypt:
  certbot_www:
  nginx_certs:
