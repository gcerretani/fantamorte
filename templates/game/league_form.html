{% extends 'base.html' %}
{% block title %}Nuova lega — Fantamorte{% endblock %}
{% block content %}

<h2 class="mb-4">Crea una nuova lega</h2>

<form method="post" class="row g-3">
  {% csrf_token %}
  <div class="col-md-8">
    <label class="form-label">Nome della lega *</label>
    <input type="text" name="name" class="form-control" value="{{ data.name|default:'' }}" required autofocus>
  </div>
  <div class="col-md-4">
    <label class="form-label">Visibilità</label>
    <select name="visibility" class="form-select">
      <option value="public" {% if data.visibility != 'private' %}selected{% endif %}>Pubblica</option>
      <option value="private" {% if data.visibility == 'private' %}selected{% endif %}>Privata (codice invito)</option>
    </select>
  </div>

  <div class="col-12 mt-2">
    <p class="text-muted small mb-0">Calendario, regole e bonus si configurano dal pannello admin della lega dopo la creazione.</p>
  </div>

  <div class="col-12 mt-3">
    <button type="submit" class="btn btn-success">Crea la lega</button>
    <a href="{% url 'league_list' %}" class="btn btn-outline-secondary">Annulla</a>
  </div>
</form>

{% endblock %}
